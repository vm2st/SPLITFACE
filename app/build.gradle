plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.vm2st.splitface'
    compileSdk 36

    defaultConfig {
        applicationId 'com.vm2st.splitface'
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.18.0'
    implementation 'androidx.appcompat:appcompat:1.7.1'
}